name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-audit:
    runs-on: windows-latest

    env:
      CLI_DIR: RustPlusDesktop/runtime/rustplus-cli
      INSTALLER_PATH: RustPlusDesktop/bin/Installer/RustPlusDesk-Setup.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: RustPlusDesktop/runtime/rustplus-cli/package-lock.json

      - name: Restore .NET
        run: dotnet restore RustPlusDesk.sln

      - name: Build .NET
        run: dotnet build RustPlusDesk.sln --configuration Release --no-restore

      - name: Test .NET
        run: dotnet test RustPlusDesk.sln --configuration Release --no-build --logger trx

      - name: Audit NuGet packages
        run: dotnet list RustPlusDesk.sln package --vulnerable --include-transitive

      - name: Install CLI dependencies
        working-directory: ${{ env.CLI_DIR }}
        run: npm ci --omit=dev

      - name: Test CLI dependency load
        working-directory: ${{ env.CLI_DIR }}
        run: npm test

      - name: Audit CLI dependencies
        working-directory: ${{ env.CLI_DIR }}
        run: npm audit --omit=dev

      - name: Package CLI runtime
        run: .\scripts\package-rustplus-cli.ps1 -SkipInstall -SkipTest -SkipAudit

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Publish Windows app
        run: >
          dotnet publish RustPlusDesktop/RustPlusDesk.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=false
          -o RustPlusDesktop/bin/Installer/publish

      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .\RustPlusDesktop\Installer\Setup.iss'

      - name: Sign installer
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "Signing skipped because code signing secrets are not configured."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe was not found on the runner." }
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p "$env:WINDOWS_CERTIFICATE_PASSWORD" "$env:INSTALLER_PATH"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustPlusDesk-Setup
          path: ${{ env.INSTALLER_PATH }}
          if-no-files-found: error

      - name: Publish installer on tag release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $asset = "${env:INSTALLER_PATH}"
          $repo = "${env:GITHUB_REPOSITORY}"

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --repo $repo --clobber
            exit 0
          }

          $notes = @"
          ## Connection fallback update

          - Improved Rust+ connection diagnostics for not_found vs timeout failures.
          - Added clearer in-app guidance for re-pair and connectivity issues.
          - Includes latest installer build from this tag.
          "@

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -LiteralPath $notesPath -Value $notes -Encoding UTF8

          gh release create $tag $asset --repo $repo --title "RustPlusDesk $tag" --notes-file $notesPath
